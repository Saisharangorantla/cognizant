spring.application.name=edge-service
server.port=8080

# Route any request under /example/** to the backend-service.
spring.cloud.gateway.routes[0].id=example_route
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/example/**
spring.cloud.gateway.routes[0].filters[0]=AddResponseHeader=X-Response-Origin,edge-service

management.endpoints.web.exposure.include=health,info,gateway
logging.level.com.acme.edgeservice=INFO
