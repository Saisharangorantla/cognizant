spring.application.name=resilient-gateway
server.port=8080

# Requests under /unstable/** are routed to unstable-service and wrapped
# in a circuit breaker named "exampleCircuitBreaker". If the call fails,
# times out, or the breaker is open, the gateway forwards internally to
# the /fallback endpoint instead of surfacing the raw error.
spring.cloud.gateway.routes[0].id=unstable_route
spring.cloud.gateway.routes[0].uri=http://localhost:8082
spring.cloud.gateway.routes[0].predicates[0]=Path=/unstable/**
spring.cloud.gateway.routes[0].filters[0]=CircuitBreaker=name=exampleCircuitBreaker,fallbackUri=forward:/fallback

resilience4j.circuitbreaker.instances.exampleCircuitBreaker.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.exampleCircuitBreaker.slidingWindowSize=10
resilience4j.circuitbreaker.instances.exampleCircuitBreaker.failureRateThreshold=50
resilience4j.circuitbreaker.instances.exampleCircuitBreaker.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.exampleCircuitBreaker.permittedNumberOfCallsInHalfOpenState=3
resilience4j.timelimiter.instances.exampleCircuitBreaker.timeoutDuration=3s

management.endpoints.web.exposure.include=health,gateway,circuitbreakers,circuitbreakerevents
management.health.circuitbreakers.enabled=true
logging.level.io.github.resilience4j=INFO
