spring.application.name=api-gateway
server.port=8080

# Route requests under /loadbalanced/** to the "example-service" client.
# The lb:// scheme tells Spring Cloud Gateway to resolve the host through
# the load balancer instead of treating it as a literal URI.
spring.cloud.gateway.routes[0].id=load_balanced_route
spring.cloud.gateway.routes[0].uri=lb://example-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/loadbalanced/**

# There is no service registry (Eureka/Consul) in this exercise, so we
# describe the available instances of "example-service" statically using
# Spring Cloud's built-in SimpleDiscoveryClient. The load balancer will
# pick between these two instances using our custom RandomLoadBalancer.
spring.cloud.discovery.client.simple.instances.example-service[0].uri=http://localhost:8081
spring.cloud.discovery.client.simple.instances.example-service[1].uri=http://localhost:8082

spring.cloud.loadbalancer.cache.enabled=false

management.endpoints.web.exposure.include=health,info,gateway
logging.level.org.springframework.cloud.loadbalancer=INFO
