server.port=8761
spring.application.name=eureka-server

# This instance IS the registry, so it doesn't register itself as a
# client or try to pull a registry from another Eureka instance.
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# Quiets down Eureka's fairly chatty internal logging, as in the exercise sheet.
logging.level.com.netflix.eureka=OFF
logging.level.com.netflix.discovery=OFF
