# ============================================================
# Exercise 1 — H2 Database Configuration
# ============================================================
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 console (handy for inspecting data in the browser during development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# JPA / Hibernate Configuration
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# Exercise 10 — Hibernate Batch Processing Configuration
# Groups multiple INSERT/UPDATE statements into JDBC batches
# instead of sending them one at a time.
# ============================================================
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.batch_versioned_data=true

# ============================================================
# Exercise 9 — Secondary DataSource (reporting)
# Externalized as its own prefix so HikariCP/JPA auto-config
# does not pick it up as the primary datasource.
# See config/SecondaryDataSourceConfig.java for wiring.
# ============================================================
reporting.datasource.url=jdbc:h2:mem:reportingdb
reporting.datasource.driverClassName=org.h2.Driver
reporting.datasource.username=sa
reporting.datasource.password=password

# ============================================================
# Logging
# ============================================================
logging.level.com.cognizant.ems=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
